<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rapid Grow Performance Hub — plan goals, manage tasks, communicate with your team, and track execution in one workplace OS.">
    <meta name="theme-color" content="#E61C21">
    <meta name="color-scheme" content="light dark">
    <title>Rapid Grow — Performance Hub</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>
      (function () {
        try {
          var key = 'theme';
          var legacyKey = 'rapidgrow-theme';
          var stored = localStorage.getItem(key);
          var legacyStored = localStorage.getItem(legacyKey);
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var preference =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : legacyStored === 'light' || legacyStored === 'dark' || legacyStored === 'system'
                ? legacyStored
                : 'system';
          var resolved =
            preference === 'system'
              ? (prefersDark ? 'dark' : 'light')
              : preference;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = resolved;
        } catch (_) {
          document.documentElement.classList.remove('dark');
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.themePreference = 'system';
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
    <style>
        body, #root {
          background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .text-glow-red {
            text-shadow: 0 0 15px rgba(230, 28, 33, 0.3);
        }
        .animate-pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        input[list]::-webkit-calendar-picker-indicator {
          display: none !important;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-brand-grey overflow-hidden selection:bg-brand-red/10 selection:text-brand-red">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
